name: ci
on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ["*"]
    branches: ["master"]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  MISE_EXPERIMENTAL: true
jobs:
  ci:
    runs-on: ubuntu-latest
    # CI runs the -short suite (heavy recovery e2e tests are gated out), so the
    # gate is lint + scans + fast tests; 15 min is ample headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so `mise run scan:secrets` (gitleaks) can scan all commits
      # Restore the Go build/module + per-tool caches BEFORE mise-action. mise
      # installs the `go:` tools (gosec, govulncheck, …) via `go install`, which
      # populates ~/go/pkg/mod and ~/.cache/go-build with read-only files; if the
      # cache is restored after that, tar fails to overwrite them
      # ("Cannot open: File exists"). Restoring first extracts into empty dirs.
      # Without this caching every run recompiles the whole module from cold for
      # golangci-lint, gosec, govulncheck, build, and test — the dominant cost.
      - name: Cache Go & tool caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.cache/golangci-lint
            ~/.cache/grype/db
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - uses: jdx/mise-action@v3 # caches the mise toolchain (go, golangci-lint, gosec, …) by default
      - run: mise run ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          fail_ci_if_error: false # don't break CI if Codecov isn't configured yet
          token: ${{ secrets.CODECOV_TOKEN }} # required for private repos
  # Publish a cross-platform GitHub Release on a v* tag, but only after the ci
  # job above passes on that same tag — so a release can never ship a tag that
  # failed lint/test/scan. Uses the mise-pinned goreleaser (same as local
  # `mise run release`) to keep tool versions identical between dev and CI.
  release:
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # create the GitHub Release and upload archives + checksums
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history + tags so the changelog renders
      - uses: jdx/mise-action@v3
      - name: Release (goreleaser)
        run: mise run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
