# goreleaser config for the unpixel CLI.
# Local test (no publish):  mise run release:snapshot
# Real release (on a tag):  mise run release
version: 2

project_name: unpixel

before:
  hooks:
    - go mod tidy

builds:
  - id: unpixel
    main: ./cmd/unpixel
    binary: unpixel
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}
  - id: unpixel-mcp
    main: ./cmd/unpixel-mcp
    binary: unpixel-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
